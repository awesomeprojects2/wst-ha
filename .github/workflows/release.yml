name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync manifest version to tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          python3 -c "
          import json
          path = 'custom_components/wst/manifest.json'
          with open(path) as f:
              manifest = json.load(f)
          manifest['version'] = '$TAG_VERSION'
          with open(path, 'w') as f:
              json.dump(manifest, f, indent=2)
              f.write('\n')
          "

      - name: Commit synced version and update tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/wst/manifest.json
          git diff --cached --quiet || git commit -m "chore: sync version to ${{ github.ref_name }}"
          git push origin HEAD:main
          # Move the tag to include the version-sync commit so HACS gets the correct manifest
          git tag -f "${{ github.ref_name }}"
          git push origin "${{ github.ref_name }}" --force

      - name: Home Assistant hassfest
        uses: home-assistant/actions/hassfest@master

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true